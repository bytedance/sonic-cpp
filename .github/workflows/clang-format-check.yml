name: CI / clang-format

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - '.clang-format'
      - 'include/sonic/**'
      - 'benchmark/**'
      - 'tests/**'
      - 'example/**'
      - 'fuzz/**'
      - '.github/workflows/clang-format-check.yml'
  pull_request:
    paths:
      - '.clang-format'
      - 'include/sonic/**'
      - 'benchmark/**'
      - 'tests/**'
      - 'example/**'
      - 'fuzz/**'
      - '.github/workflows/clang-format-check.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  formatting-check:
    name: clang-format
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        path:
          - 'include/sonic'
          - 'benchmark'
          - 'tests'
          - 'example'
          - 'fuzz'
    steps:
    - uses: actions/checkout@v4
    - name: Run clang-format style check.
      uses: jidicula/clang-format-action@v4.9.0
      with:
        clang-format-version: '14'
        check-path: ${{ matrix.path }}
        fallback-style: 'Google'

name: CI / Test (ARM)

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test_arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++
      - name: Build and test NEON
        run: |
          cmake -S . -B build-neon -G Ninja
          cmake --build build-neon
          ASAN_OPTIONS=detect_stack_use_after_return=0 ./build-neon/tests/unittest
      - name: Check for SVE2
        id: sve_check
        run: |
          if grep -q "sve2" /proc/cpuinfo; then
            echo "SVE2 supported!"
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "SVE2 NOT supported, skipping..."
            echo "supported=false" >> $GITHUB_OUTPUT
          fi
      - name: Build and test SVE2
        if: steps.sve_check.outputs.supported == 'true'
        run: |
          cmake -S . -B build-sve -G Ninja -DENABLE_SVE2_128=ON
          cmake --build build-sve
          ASAN_OPTIONS=detect_stack_use_after_return=0 ./build-sve/tests/unittest
